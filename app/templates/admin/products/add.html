{% extends "base.html" %}
{% block title %}添加商品{% endblock %}
{% block content %}
<div class="form-container">
    <h3 class="mb-4">添加新商品</h3>
    <form method="POST" enctype="multipart/form-data">
        <div class="mb-3"><label class="form-label">商品名称 <span class="text-danger">*</span></label><input type="text" name="name" class="form-control" required></div>
        <div class="mb-3"><label class="form-label">所属分类</label><select name="category_id" class="form-select"><option value="">未分类</option>{% for c in categories %}<option value="{{ c.id }}">{{ c.name }}</option>{% endfor %}</select></div>
        <div class="mb-3"><label class="form-label">商品描述</label><textarea name="description" class="form-control" rows="3"></textarea></div>
        <div class="row g-2 mb-3">
            <div class="col-6"><label class="form-label">价格 <span class="text-danger">*</span></label><input type="number" name="price" class="form-control" step="0.01" min="0" required></div>
            <div class="col-6"><label class="form-label">库存 <span class="text-danger">*</span></label><input type="number" name="stock" class="form-control" min="0" required></div>
        </div>
        <div class="mb-3"><label class="form-label">商品图片</label><input type="file" name="image" class="form-control" accept="image/*"><small class="text-muted">支持JPG/PNG，不超过2MB</small></div>
        <button type="submit" class="btn btn-success">提交</button>
        <a href="{{ url_for('admin.product_list') }}" class="btn btn-outline-secondary">取消</a>
    </form>
</div>
{% endblock %}
