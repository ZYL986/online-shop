{% extends "base.html" %}
{% block title %}编辑商品 - {{ product.name }}{% endblock %}
{% block content %}
<div class="form-container">
    <h3 class="mb-4">编辑商品：{{ product.name }}</h3>
    <form method="POST" enctype="multipart/form-data">
        <div class="mb-3"><label class="form-label">商品名称 <span class="text-danger">*</span></label><input type="text" name="name" class="form-control" value="{{ product.name }}" required></div>
        <div class="mb-3"><label class="form-label">所属分类</label><select name="category_id" class="form-select"><option value="">未分类</option>{% for c in categories %}<option value="{{ c.id }}" {% if product.category_id == c.id %}selected{% endif %}>{{ c.name }}</option>{% endfor %}</select></div>
        <div class="mb-3"><label class="form-label">商品描述</label><textarea name="description" class="form-control" rows="3">{{ product.description or "" }}</textarea></div>
        <div class="row g-2 mb-3">
            <div class="col-6"><label class="form-label">价格 <span class="text-danger">*</span></label><input type="number" name="price" class="form-control" step="0.01" min="0" value="{{ product.price }}" required></div>
            <div class="col-6"><label class="form-label">库存 <span class="text-danger">*</span></label><input type="number" name="stock" class="form-control" min="0" value="{{ product.stock }}" required></div>
        </div>
        <div class="mb-3"><label class="form-label">商品图片（可选更新）</label><input type="file" name="image" class="form-control" accept="image/*">{% if product.image_filename %}<div class="mt-2"><img src="{{ url_for('static', filename='images/' + product.image_filename) }}" width="80" class="rounded" alt="当前图片"></div>{% endif %}</div>
        <button type="submit" class="btn btn-primary">保存</button>
        <a href="{{ url_for('admin.product_list') }}" class="btn btn-outline-secondary">取消</a>
    </form>
</div>
{% endblock %}
