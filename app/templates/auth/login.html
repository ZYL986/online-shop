{% extends "base.html" %}
{% block title %}用户登录{% endblock %}
{% block content %}
<div class="form-container">
    <h3 class="text-center mb-4">账号登录</h3>
    <form method="POST">
        <div class="mb-3"><label class="form-label">用户名或邮箱</label><input type="text" name="login_param" class="form-control" required></div>
        <div class="mb-3"><label class="form-label">密码</label><input type="password" name="password" class="form-control" required></div>
        <div class="mb-3 form-check"><input type="checkbox" name="remember" class="form-check-input" id="remember"><label class="form-check-label" for="remember">记住我</label></div>
        <button type="submit" class="btn btn-primary w-100">登录</button>
        <p class="text-center mt-3"><small>还没有账号？<a href="{{ url_for('auth.register') }}">立即注册</a></small></p>
    </form>
</div>
{% endblock %}
