{% extends "base.html" %}
{% block title %}用户注册{% endblock %}
{% block content %}
<div class="form-container">
    <h3 class="text-center mb-4">创建账号</h3>
    <form method="POST">
        <div class="mb-3"><label class="form-label">用户名</label><input type="text" name="username" class="form-control" required minlength="4" placeholder="至少4个字符"></div>
        <div class="mb-3"><label class="form-label">邮箱</label><input type="email" name="email" class="form-control" required></div>
        <div class="mb-3"><label class="form-label">所在地区</label><input type="text" name="region" class="form-control" placeholder="如：北京、上海、广州"></div>
        <div class="mb-3"><label class="form-label">密码</label><input type="password" name="password" class="form-control" required minlength="6" placeholder="至少6个字符"></div>
        <div class="mb-3"><label class="form-label">确认密码</label><input type="password" name="password2" class="form-control" required minlength="6"></div>
        <button type="submit" class="btn btn-primary w-100">注册</button>
        <p class="text-center mt-3"><small>已有账号？<a href="{{ url_for('auth.login') }}">立即登录</a></small></p>
    </form>
</div>
{% endblock %}
