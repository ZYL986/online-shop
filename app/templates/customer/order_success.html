{% extends "base.html" %}
{% block title %}下单成功{% endblock %}
{% block content %}
<div class="text-center py-5">
    <h2 class="text-success mb-3">订单提交成功！</h2>
    <p>您的订单 <strong>{{ order.order_no }}</strong> 已确认发货。</p>
    <p class="text-muted">订单金额：&yen;{{ "%.2f"|format(order.total_amount) }}</p>
    <p class="text-muted small">确认邮件已发送至 {{ order.user.email }}</p>
    <div class="mt-4 d-flex gap-2 justify-content-center">
        <a href="{{ url_for('customer.orders') }}" class="btn btn-outline-primary">查看我的订单</a>
        <a href="{{ url_for('customer.index') }}" class="btn btn-primary">继续购物</a>
    </div>
</div>
{% endblock %}
